<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>


<style>
    .container{
        background-color: aqua;
        display: flex;
        flex-direction: row;
        justify-content: space-around;

        align-items: center;
            }

    .container .box{
        height: 140px;
        width: 160px;
        background-color: lightblue;
        border: 3px solid brown;
    }
</style>
<link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>Flexbox example</h1>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
        <div class="box">4</div>
    </div>
</body>
    
</style>
</html>
